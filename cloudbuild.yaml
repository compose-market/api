# Cloud Build configuration for compose-market-api
# Usage: gcloud builds submit --config=cloudbuild.yaml .
# Or trigger automatically via Cloud Build triggers

substitutions:
  _REGION: us-east1
  _SERVICE_NAME: compose-market-api
  _REPO_NAME: compose
  _SERVICE_ACCOUNT: compose-api@gen-lang-client-0035632562.iam.gserviceaccount.com

steps:
  # Build container image with Cloud Build
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'
      - '--platform'
      - 'linux/amd64'
      - '.'
    waitFor: ['-']

  # Push images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}']
    waitFor: ['build']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-service'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ${_SERVICE_NAME} \
          --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA \
          --region ${_REGION} \
          --platform managed \
          --service-account ${_SERVICE_ACCOUNT} \
          --allow-unauthenticated \
          --port 3000 \
          --cpu 2 \
          --memory 4Gi \
          --min-instances 1 \
          --max-instances 10 \
          --timeout 300 \
          --set-env-vars "NODE_ENV=production" \
          --set-secrets "
          GOOGLE_CLOUD_PROJECT_ID=GOOGLE_CLOUD_PROJECT_ID:latest,
          VERTEX_PROJECT_ID=VERTEX_PROJECT_ID:latest,
          CRONOS_TESTNET_CHAIN_ID=CRONOS_TESTNET_CHAIN_ID:latest,
          CRONOS_TESTNET_RPC=CRONOS_TESTNET_RPC:latest,
          CRONOS_TESTNET_EXPLORER=CRONOS_TESTNET_EXPLORER:latest,
          CRONOS_TESTNET_ENTRYPOINT=CRONOS_TESTNET_ENTRYPOINT:latest,
          CRONOS_TESTNET_ACCOUNT_FACTORY=CRONOS_TESTNET_ACCOUNT_FACTORY:latest,
          CRONOS_TESTNET_ACCOUNT_IMPLEMENTATION=CRONOS_TESTNET_ACCOUNT_IMPLEMENTATION:latest,
          CRONOS_TESTNET_PAYMASTER=CRONOS_TESTNET_PAYMASTER:latest,
          DEV_USDC_E_ADDRESS=DEV_USDC_E_ADDRESS:latest,
          DISPENSER_CONTRACT=DISPENSER_CONTRACT:latest,
          AVALANCHE_FUJI_CHAIN_ID=AVALANCHE_FUJI_CHAIN_ID:latest,
          AVALANCHE_FUJI_RPC=AVALANCHE_FUJI_RPC:latest,
          AVALANCHE_MAINNET_RPC=AVALANCHE_MAINNET_RPC:latest,
          ARBITRUM_SEPOLIA_RPC=ARBITRUM_SEPOLIA_RPC:latest,
          API_URL=API_URL:latest,MANOWAR_URL=MANOWAR_URL:latest,
          RUNTIME_URL=RUNTIME_URL:latest,
          CONNECTOR_URL=CONNECTOR_URL:latest,
          EXPORTER_URL=EXPORTER_URL:latest,
          IPFS_PINATA_GATEWAY=IPFS_PINATA_GATEWAY:latest,
          TEMPORAL_ADDRESS=TEMPORAL_ADDRESS:latest,
          TEMPORAL_NAMESPACE=TEMPORAL_NAMESPACE:latest,
          REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT=REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT:latest,
          REDIS_TLS=REDIS_TLS:latest,
          IP_ACCESS=IP_ACCESS:latest,
          THIRDWEB_CLIENT_ID=THIRDWEB_CLIENT_ID:latest,
          MERCHANT_WALLET_ADDRESS=MERCHANT_WALLET_ADDRESS:latest,
          THIRDWEB_SERVER_WALLET_ADDRESS=THIRDWEB_SERVER_WALLET_ADDRESS:latest,
          TREASURY_SERVER_WALLET_PUBLIC=TREASURY_SERVER_WALLET_PUBLIC:latest,
          CF_ACCOUNT_ID=CF_ACCOUNT_ID:latest,
          CF_EMBEDDING_MODEL=CF_EMBEDDING_MODEL:latest,
          TG_BOT_USERNAME=TG_BOT_USERNAME:latest,
          THIRDWEB_SECRET_KEY=THIRDWEB_SECRET_KEY:latest,
          PINATA_API_Key=PINATA_API_Key:latest,
          PINATA_API_SECRET=PINATA_API_SECRET:latest,
          PINATA_JWT=PINATA_JWT:latest,
          VERTEX_AI_API_KEY=VERTEX_AI_API_KEY:latest,
          GOOGLE_GENERATIVE_AI_API_KEY=GOOGLE_GENERATIVE_AI_API_KEY:latest,
          OPENAI_API_KEY=OPENAI_API_KEY:latest,
          ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,
          ASI_ONE_API_KEY=ASI_ONE_API_KEY:latest,
          ASI_INFERENCE_API_KEY=ASI_INFERENCE_API_KEY:latest,
          OPEN_ROUTER_API_KEY=OPEN_ROUTER_API_KEY:latest,
          AI_ML_API_KEY=AI_ML_API_KEY:latest,
          HUGGING_FACE_INFERENCE_TOKEN=HUGGING_FACE_INFERENCE_TOKEN:latest,
          FAL_API_KEY=FAL_API_KEY:latest,
          LYRIA_REALTIME_API_KEY=LYRIA_REALTIME_API_KEY:latest,
          FIREWORKS_API_KEY=FIREWORKS_API_KEY:latest,
          MONGO_DB_API_KEY=MONGO_DB_API_KEY:latest,
          DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest,
          PERPLEXITY_API_KEY=PERPLEXITY_API_KEY:latest,
          CHAIN_GPT_SECRET_KEY=CHAIN_GPT_SECRET_KEY:latest,
          AGENTVERSE_API_KEY=AGENTVERSE_API_KEY:latest,
          LANGSMITH_API_KEY=LANGSMITH_API_KEY:latest,
          TEMPORAL_API_KEY=TEMPORAL_API_KEY:latest,
          GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest,
          COMPOSIO_API_KEY=COMPOSIO_API_KEY:latest,
          COMPOSE_BOT_HTTP_API=COMPOSE_BOT_HTTP_API:latest,
          DEPLOYER_KEY=DEPLOYER_KEY:latest,
          SERVER_WALLET_KEY=SERVER_WALLET_KEY:latest,
          MANOWAR_INTERNAL_SECRET=MANOWAR_INTERNAL_SECRET:latest,
          REDIS_KEYS_API_KEY=REDIS_KEYS_API_KEY:latest,
          REDIS_KEYS_DEFAULT_PASSWORD=REDIS_KEYS_DEFAULT_PASSWORD:latest,
          REDIS_API_KEY=REDIS_API_KEY:latest,
          COMPOSE_SESSION_SECRET=COMPOSE_SESSION_SECRET:latest,
          CF_API_TOKEN=CF_API_TOKEN:latest,
          TEMPORAL_ALEX_API_KEY=TEMPORAL_ALEX_API_KEY:latest"
    waitFor: ['push']

  # Update Cloud Run Jobs
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-jobs'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Batch Settlement Job
        gcloud run jobs update compose-market-settlement \
          --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA \
          --region ${_REGION} \
          --tasks 1 \
          --max-retries 0 \
          --task-timeout 600s \
          --service-account ${_SERVICE_ACCOUNT} \
          --set-env-vars "JOB_TASK=batch-settlement,NODE_ENV=production" \
          --set-secrets "GOOGLE_CLOUD_PROJECT_ID=GOOGLE_CLOUD_PROJECT_ID:latest,
          VERTEX_PROJECT_ID=VERTEX_PROJECT_ID:latest,
          CRONOS_TESTNET_CHAIN_ID=CRONOS_TESTNET_CHAIN_ID:latest,
          DEV_USDC_E_ADDRESS=DEV_USDC_E_ADDRESS:latest,
          DISPENSER_CONTRACT=DISPENSER_CONTRACT:latest,
          REDIS_TLS=REDIS_TLS:latest,
          REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT=REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT:latest,
          SERVER_WALLET_KEY=SERVER_WALLET_KEY:latest,
          DEPLOYER_KEY=DEPLOYER_KEY:latest,
          MANOWAR_INTERNAL_SECRET=MANOWAR_INTERNAL_SECRET:latest,
          REDIS_KEYS_API_KEY=REDIS_KEYS_API_KEY:latest,
          REDIS_KEYS_DEFAULT_PASSWORD=REDIS_KEYS_DEFAULT_PASSWORD:latest,
          REDIS_API_KEY=REDIS_API_KEY:latest" 2>/dev/null || \
        gcloud run jobs create compose-market-settlement \
          --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA \
          --region ${_REGION} \
          --tasks 1 \
          --max-retries 0 \
          --task-timeout 600s \
          --service-account ${_SERVICE_ACCOUNT} \
          --set-env-vars "JOB_TASK=batch-settlement,NODE_ENV=production" \
          --set-secrets "GOOGLE_CLOUD_PROJECT_ID=GOOGLE_CLOUD_PROJECT_ID:latest,
          VERTEX_PROJECT_ID=VERTEX_PROJECT_ID:latest,
          CRONOS_TESTNET_CHAIN_ID=CRONOS_TESTNET_CHAIN_ID:latest,
          DEV_USDC_E_ADDRESS=DEV_USDC_E_ADDRESS:latest,
          DISPENSER_CONTRACT=DISPENSER_CONTRACT:latest,
          REDIS_TLS=REDIS_TLS:latest,
          REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT=REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT:latest,
          SERVER_WALLET_KEY=SERVER_WALLET_KEY:latest,
          DEPLOYER_KEY=DEPLOYER_KEY:latest,
          MANOWAR_INTERNAL_SECRET=MANOWAR_INTERNAL_SECRET:latest,
          REDIS_KEYS_API_KEY=REDIS_KEYS_API_KEY:latest,
          REDIS_KEYS_DEFAULT_PASSWORD=REDIS_KEYS_DEFAULT_PASSWORD:latest,
          REDIS_API_KEY=REDIS_API_KEY:latest"

        # Expiry Scan Job
        gcloud run jobs update compose-market-expiry \
          --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA \
          --region ${_REGION} \
          --tasks 1 \
          --max-retries 0 \
          --task-timeout 300s \
          --service-account ${_SERVICE_ACCOUNT} \
          --set-env-vars "JOB_TASK=expiry-scan,NODE_ENV=production" \
          --set-secrets "REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT=REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT:latest,
          REDIS_KEYS_DEFAULT_PASSWORD=REDIS_KEYS_DEFAULT_PASSWORD:latest,
          REDIS_TLS=REDIS_TLS:latest" 2>/dev/null || \
        gcloud run jobs create compose-market-expiry \
          --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA \
          --region ${_REGION} \
          --tasks 1 \
          --max-retries 0 \
          --task-timeout 300s \
          --service-account ${_SERVICE_ACCOUNT} \
          --set-env-vars "JOB_TASK=expiry-scan,NODE_ENV=production" \
          --set-secrets "REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT=REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT:latest,
          REDIS_KEYS_DEFAULT_PASSWORD=REDIS_KEYS_DEFAULT_PASSWORD:latest,
          REDIS_TLS=REDIS_TLS:latest"
    waitFor: ['deploy-service']

# Output the service URL
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Build timeout
timeout: '1800s'

# Images to be pushed
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'
