service: compose-market-api

provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-1
  stage: ${opt:stage, 'prod'}
  memorySize: 2048
  timeout: 120
  environment:
    THIRDWEB_SECRET_KEY: ${env:THIRDWEB_SECRET_KEY}
    THIRDWEB_SERVER_WALLET_ADDRESS: ${env:THIRDWEB_SERVER_WALLET_ADDRESS}
    MERCHANT_WALLET_ADDRESS: ${env:MERCHANT_WALLET_ADDRESS}
    GOOGLE_GENERATIVE_AI_API_KEY: ${env:GOOGLE_GENERATIVE_AI_API_KEY}
    OPENAI_API_KEY: ${env:OPENAI_API_KEY}
    ANTHROPIC_API_KEY: ${env:ANTHROPIC_API_KEY}
    ASI_ONE_API_KEY: ${env:ASI_ONE_API_KEY}
    ASI_INFERENCE_API_KEY: ${env:ASI_INFERENCE_API_KEY}
    HUGGING_FACE_INFERENCE_TOKEN: ${env:HUGGING_FACE_INFERENCE_TOKEN}
    FAL_API_KEY: ${env:FAL_API_KEY}
    OPEN_ROUTER_API_KEY: ${env:OPEN_ROUTER_API_KEY}
    AI_ML_API_KEY: ${env:AI_ML_API_KEY}
    AGENTVERSE_API_KEY: ${env:AGENTVERSE_API_KEY}
    MEM0_API_KEY: ${env:MEM0_API_KEY}
    LANGSMITH_API_KEY: ${env:LANGSMITH_API_KEY}
    PERPLEXITY_API_KEY: ${env:PERPLEXITY_API_KEY}
    DEEPGRAM_API_KEY: ${env:DEEPGRAM_API_KEY}
    MANOWAR_INTERNAL_SECRET: ${env:MANOWAR_INTERNAL_SECRET}
    REDIS_DATABASE_PUBLIC_ENDPOINT: ${env:REDIS_DATABASE_PUBLIC_ENDPOINT}
    REDIS_DEFAULT_PASSWORD: ${env:REDIS_DEFAULT_PASSWORD}
    REDIS_API_KEY: ${env:REDIS_API_KEY}
    REDIS_TLS: ${env:REDIS_TLS, 'true'}
    SESSION_SECRET: ${env:SESSION_SECRET}
    DEPLOYER_KEY: ${env:DEPLOYER_KEY}
    CRONOS_TESTNET_PAYMASTER: ${env:CRONOS_TESTNET_PAYMASTER}
    SERVER_WALLET_KEY: ${env:SERVER_WALLET_KEY}
    CF_API_TOKEN: ${env:CF_API_TOKEN}
    CF_ACCOUNT_ID: ${env:CF_ACCOUNT_ID}
    CF_EMBEDDING_MODEL: ${env:CF_EMBEDDING_MODEL}

functions:
  api:
    handler: dist/index.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY
  
  # Batch Settlement Worker - runs every 2 minutes
  # Settles accumulated payment intents for deferred settlement
  batchSettlement:
    handler: dist/index.batchSettlementHandler
    timeout: 60
    memorySize: 512
    events:
      - schedule:
          rate: rate(2 minutes)
          enabled: true
          input:
            source: "scheduled"

plugins:
  - serverless-domain-manager

custom:
  customDomain:
    domainName: api.compose.market
    basePath: ''
    stage: $default
    certificateName: api.compose.market
    createRoute53Record: false
    endpointType: regional
    securityPolicy: tls_1_2
    apiType: http

package:
  patterns:
    - '!**'
    - 'dist/**'
    - 'dist/data/**'
