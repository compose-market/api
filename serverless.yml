service: compose-market-api

provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-1
  stage: ${opt:stage, 'prod'}
  memorySize: 2048
  timeout: 120
  
  # CloudWatch Logs Configuration
  logs:
    httpApi:
      format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","responseLatency":"$context.responseLatency","integrationLatency":"$context.integrationLatency"}'
  
  environment:
    LOG_LEVEL: ${env:LOG_LEVEL, 'info'}
    THIRDWEB_SECRET_KEY: ${env:THIRDWEB_SECRET_KEY}
    THIRDWEB_SERVER_WALLET_ADDRESS: ${env:THIRDWEB_SERVER_WALLET_ADDRESS}
    MERCHANT_WALLET_ADDRESS: ${env:MERCHANT_WALLET_ADDRESS}
    GOOGLE_GENERATIVE_AI_API_KEY: ${env:GOOGLE_GENERATIVE_AI_API_KEY}
    OPENAI_API_KEY: ${env:OPENAI_API_KEY}
    ANTHROPIC_API_KEY: ${env:ANTHROPIC_API_KEY}
    ASI_ONE_API_KEY: ${env:ASI_ONE_API_KEY}
    ASI_INFERENCE_API_KEY: ${env:ASI_INFERENCE_API_KEY}
    HUGGING_FACE_INFERENCE_TOKEN: ${env:HUGGING_FACE_INFERENCE_TOKEN}
    FAL_API_KEY: ${env:FAL_API_KEY}
    OPEN_ROUTER_API_KEY: ${env:OPEN_ROUTER_API_KEY}
    AI_ML_API_KEY: ${env:AI_ML_API_KEY}
    VERTEX_AI_API_KEY: ${env:VERTEX_AI_API_KEY}
    VERTEX_PROJECT_ID: ${env:VERTEX_PROJECT_ID}
    AGENTVERSE_API_KEY: ${env:AGENTVERSE_API_KEY}
    COMPOSIO_API_KEY: ${env:COMPOSIO_API_KEY}
    MEM0_API_KEY: ${env:MEM0_API_KEY}
    LANGSMITH_API_KEY: ${env:LANGSMITH_API_KEY}
    PERPLEXITY_API_KEY: ${env:PERPLEXITY_API_KEY}
    DEEPGRAM_API_KEY: ${env:DEEPGRAM_API_KEY}
    MANOWAR_INTERNAL_SECRET: ${env:MANOWAR_INTERNAL_SECRET}
    REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT: ${env:REDIS_KEYS_DATABASE_PUBLIC_ENDPOINT}
    REDIS_KEYS_DEFAULT_PASSWORD: ${env:REDIS_KEYS_DEFAULT_PASSWORD}
    REDIS_API_KEY: ${env:REDIS_API_KEY}
    REDIS_TLS: ${env:REDIS_TLS, 'true'}
    SESSION_SECRET: ${env:SESSION_SECRET}
    DEPLOYER_KEY: ${env:DEPLOYER_KEY}
    DISPENSER_CONTRACT: ${env:DISPENSER_CONTRACT}
    CRONOS_TESTNET_PAYMASTER: ${env:CRONOS_TESTNET_PAYMASTER}
    SERVER_WALLET_KEY: ${env:SERVER_WALLET_KEY}
    CF_API_TOKEN: ${env:CF_API_TOKEN}
    CF_ACCOUNT_ID: ${env:CF_ACCOUNT_ID}
    CF_EMBEDDING_MODEL: ${env:CF_EMBEDDING_MODEL}
    COMPOSE_BOT_HTTP_API: ${env:COMPOSE_BOT_HTTP_API}
    TG_BOT_USERNAME: ${env:TG_BOT_USERNAME}
    CRONOS_TESTNET_RPC: ${env:CRONOS_TESTNET_RPC}
    AVALANCHE_FUJI_RPC: ${env:AVALANCHE_FUJI_RPC}
    ARBITRUM_SEPOLIA_RPC: ${env:ARBITRUM_SEPOLIA_RPC}
    CRONOS_TESTNET_CHAIN_ID: ${env:CRONOS_TESTNET_CHAIN_ID, '338'}
    AVALANCHE_FUJI_CHAIN_ID: ${env:AVALANCHE_FUJI_CHAIN_ID, '43113'}
    ARBITRUM_SEPOLIA_CHAIN_ID: ${env:ARBITRUM_SEPOLIA_CHAIN_ID, '421614'}

functions:
  api:
    handler: dist/index.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY
  
  ws:
    handler: dist/index.wsHandler
    events:
      - websocket:
          route: $connect
      - websocket:
          route: $disconnect
      - websocket:
          route: subscribe
      - websocket:
          route: $default
    customDomain:
      domainName: ws.compose.market
      basePath: ''
      stage: $default
      certificateName: ws.compose.market
      createRoute53Record: true
      endpointType: regional
      securityPolicy: tls_1_2
      apiType: WebSocket
  
  expiry:
    handler: dist/index.expiryWorker
    timeout: 60
    memorySize: 256
    events:
      - schedule:
          rate: rate(1 minute)
          enabled: true
  
  batchSettlement:
    handler: dist/index.batchSettlementHandler
    timeout: 60
    memorySize: 512
    events:
      - schedule:
          rate: rate(2 minutes)
          enabled: true
          input:
            source: "scheduled"

plugins:
  - serverless-domain-manager

custom:
  customDomain:
    domainName: api.compose.market
    basePath: ''
    stage: $default
    certificateName: api.compose.market
    createRoute53Record: false
    endpointType: regional
    securityPolicy: tls_1_2
    apiType: http

  customWsDomain:
    domainName: ws.compose.market
    basePath: ''
    stage: $default
    certificateName: ws.compose.market
    createRoute53Record: true
    endpointType: regional
    securityPolicy: tls_1_2
    apiType: WebSocket

package:
  patterns:
    - '!**'
    - 'dist/**'
    - 'dist/data/**'
